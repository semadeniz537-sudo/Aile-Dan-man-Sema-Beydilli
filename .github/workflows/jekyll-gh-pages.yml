<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aile Danışmanı Sema BEYDİLLİ</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
:root {
    --yesil: #3a9d23; /* Logodaki yeşil tonu */
    --beyaz: #ffffff;
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: 'Poppins', sans-serif;
    background: var(--beyaz);
    color: var(--yesil);
}

/* Header */
header {
    display: flex;
    align-items: center;
    padding: 20px 40px;
}

header img {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    object-fit: cover;
    margin-right: 20px;
}

header .baslik {
    display: flex;
    flex-direction: column;
}

header .baslik h1 {
    font-weight: 600;
    font-size: 1.8em;
}

header .baslik p {
    font-style: italic;
    font-weight: 400;
}

/* Menü */
nav {
    background: var(--yesil);
    padding: 10px 0;
    text-align: center;
}

nav a {
    color: var(--beyaz);
    text-decoration: none;
    margin: 0 20px;
    font-weight: 500;
}

nav a:hover {
    text-decoration: underline;
}

/* Bölümler */
section {
    padding: 60px 20px;
}

h2 {
    font-size: 1.8em;
    margin-bottom: 20px;
    text-align: center;
}

/* Hizmetler */
.hizmetler {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
}

.hizmet {
    border: 2px solid var(--yesil);
    border-radius: 10px;
    padding: 20px;
    width: 250px;
    text-align: center;
    transition: transform 0.3s;
}

.hizmet:hover {
    transform: translateY(-5px);
}

/* Form */
form {
    max-width: 500px;
    margin: auto;
    display: flex;
    flex-direction: column;
}

form input, form textarea {
    padding: 10px;
    margin: 10px 0;
    border: 1px solid var(--yesil);
    border-radius: 5px;
    width: 100%;
}

form button {
    background: var(--yesil);
    color: var(--beyaz);
    border: none;
    padding: 12px;
    border-radius: 5px;
    font-size: 16px;
    cursor: pointer;
    margin-top: 10px;
}

form button:hover {
    background: #2f7c1b;
}

/* Footer */
footer {
    background: var(--yesil);
    color: var(--beyaz);
    text-align: center;
    padding: 20px;
}

/* Responsive */
@media(max-width: 768px) {
    header {
        flex-direction: column;
        text-align: center;
    }

    header img {
        margin-bottom: 10px;
    }

    .hizmetler {
        flex-direction: column;
        align-items: center;
    }

    nav a {
        display: block;
        margin: 10px 0;
    }
}
</style>
</head>

<body>

<!-- Header -->
<header>
<img src="logo.png.jpeg" alt="Logo">
<div class="baslik">
<h1>Aile Danışmanı Sema BEYDİLLİ</h1>
<p><i>Birlikte Çözüm Mümkün.</i></p>
</div>
</header>

<!-- Menü -->
<nav>
<a href="#hakkimda">Hakkımda</a>
<a href="#hizmetler">Hizmetler</a>
<a href="#randevu">Randevu</a>
<a href="#iletisim">İletişim</a>
</nav>

<!-- Hakkımda -->
<section id="hakkimda">
<h2>Hakkımda</h2>
<p style="max-width:800px; margin:auto; text-align:center;">
Aile Danışmanı Sema Beydilli olarak bireylerin ve ailelerin yaşadığı psikolojik zorluklarda profesyonel destek sunuyorum. Çalışmalarımda <b>Bilişsel Davranışçı Terapi (BDT)</b> temelli danışma yaklaşımını kullanıyorum. Amacım, danışanların güçlü yönlerini fark etmelerine ve yaşamlarında daha sağlıklı kararlar almalarına destek olmaktır.
</p>
</section>

<!-- Hizmetler -->
<section id="hizmetler">
<h2>Hizmetler</h2>
<div class="hizmetler">
<div class="hizmet">Aile Danışmanlığı</div>
<div class="hizmet">Bireysel Danışmanlık</div>
<div class="hizmet">Oyun Danışmanlığı</div>
<div class="hizmet">Eğitim Danışmanlığı</div>
<div class="hizmet">Kariyer Danışmanlığı</div>
</div>
</section>

<!-- Randevu -->
<section id="randevu">
<h2>Randevu Al</h2>
<form action="https://formspree.io/f/your-form-id" method="POST">
<input type="text" name="isim" placeholder="Adınız" required>
<input type="email" name="email" placeholder="Email" required>
<textarea name="mesaj" rows="5" placeholder="Mesajınız"></textarea>
<button type="submit">Gönder</button>
</form>
</section>

<!-- İletişim -->
<section id="iletisim">
<h2>İletişim</h2>
<p style="text-align:center;">Email: <a href="mailto:Psikolojikdanisman.sema@gmail.com">Psikolojikdanisman.sema@gmail.com</a></p>
<p style="text-align:center;">Instagram: <a href="https://www.instagram.com/psk.dan.semabeydilli" target="_blank">@psk.dan.semabeydilli</a></p>
</section>

<!-- Footer -->
<footer>
<p>© 2026 Aile Danışmanı Sema BEYDİLLİ</p>
</footer>

</body>
</html>
